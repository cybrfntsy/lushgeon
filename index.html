<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUSH — 카테고리 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:    #0a0a0a;
      --bg2:   #111;
      --bg3:   #181818;
      --line:  rgba(255,255,255,0.08);
      --line2: rgba(255,255,255,0.2);
      --w:     #ffffff;
      --muted: rgba(255,255,255,0.38);
      --r: 12px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--w); font-family:'Noto Sans KR',sans-serif; overflow-x:hidden; }
    ::-webkit-scrollbar { width:2px; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:1px; }

    /* TOPBAR */
    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 52px; height:56px;
      background:rgba(10,10,10,0.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--line);
    }
    .logo {
      font-size:14px; font-weight:600;
      letter-spacing:0.4em; text-transform:uppercase;
      color:var(--w); cursor:pointer; transition:opacity 0.2s;
    }
    .logo:hover { opacity:0.45; }
    .bc { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
    .bc .sep { opacity:0.3; font-size:9px; }
    .bc .crumb { cursor:pointer; transition:color 0.2s; }
    .bc .crumb:hover { color:var(--w); }
    .bc .act { color:var(--w); font-weight:500; cursor:default; }

    /* PAGES */
    .page { display:none; padding-top:92px; padding-bottom:80px; min-height:100vh; }
    .page.on { display:block; animation:up 0.38s cubic-bezier(0.22,1,0.36,1); }
    @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .wrap { width:min(1260px,calc(100% - 48px)); margin:0 auto; }

    /* HERO */
    .hero { padding:48px 0 52px; border-bottom:1px solid var(--line); margin-bottom:40px; }
    .eyebrow { font-size:9px; font-weight:500; letter-spacing:0.35em; text-transform:uppercase; color:var(--muted); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
    .eyebrow::before { content:''; width:18px; height:1px; background:rgba(255,255,255,0.25); }
    h1 { font-size:clamp(32px,5vw,62px); font-weight:400; line-height:1.1; letter-spacing:-0.025em; margin-bottom:14px; }
    .hero-sub { font-size:13px; font-weight:300; color:var(--muted); line-height:1.9; max-width:460px; margin-bottom:32px; }
    .stats { display:flex; gap:28px; }
    .sn { font-size:28px; font-weight:300; line-height:1; }
    .sl { font-size:10px; font-weight:400; color:var(--muted); margin-top:4px; }

    /* SECTION HEADER */
    .sh { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; }
    .sh h2 { font-size:17px; font-weight:500; letter-spacing:-0.01em; }
    .sh span { font-size:9px; font-weight:500; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; }

    /* GRIDS */
    .g3  { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .g4  { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .g3b { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }

    /* CARD */
    .card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; cursor:pointer; transition:border-color 0.25s, box-shadow 0.3s, transform 0.3s cubic-bezier(0.22,1,0.36,1); }
    .card:hover { border-color:rgba(255,255,255,0.22); transform:translateY(-5px); box-shadow:0 18px 44px rgba(0,0,0,0.75); }

    /* image wrapper */
    .iw { overflow:hidden; background:var(--bg3); }
    .iw img { width:100%; height:100%; display:block; object-fit:contain; padding:6%; transition:transform 0.5s cubic-bezier(0.22,1,0.36,1); background:var(--bg3); }
    .card:hover .iw img { transform:scale(1.04); }

    /* aspect ratios */
    .c1 .iw { aspect-ratio:4/3; }
    .c2 .iw { aspect-ratio:1/1; }
    .c3 .iw { aspect-ratio:1/1; }
    .c3 { cursor:default; }
    .c3:hover { transform:none; box-shadow:none; border-color:var(--line); }

    /* body */
    .bd { padding:14px 13px 13px; border-top:1px solid var(--line); }
    .tag { font-size:9px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; display:block; }
    .ttl { font-size:16px; font-weight:500; letter-spacing:-0.01em; margin-bottom:7px; line-height:1.25; }
    .dsc { font-size:11px; font-weight:300; color:var(--muted); line-height:1.75; margin-bottom:11px; }
    .chips { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
    .chip { font-size:9px; font-weight:400; padding:3px 8px; border:1px solid var(--line2); border-radius:100px; color:rgba(255,255,255,0.5); }
    .cta { display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.45); padding:6px 13px; border:1px solid var(--line2); border-radius:100px; transition:color 0.2s, border-color 0.2s, background 0.2s; }
    .card:hover .cta { color:var(--w); border-color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.05); }

    /* sub/item cards */
    .c2 .bd { padding:12px 11px; }
    .c2 .ttl { font-size:14px; }
    .c2 .dsc { font-size:11px; margin-bottom:9px; }
    .c3 .bd { padding:11px 10px; }
    .c3 .ttl { font-size:13px; margin-bottom:5px; }
    .c3 .dsc { font-size:10px; margin-bottom:0; }

    /* BANNER */
    .banner { display:flex; align-items:center; gap:16px; padding:20px 24px; background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); margin-bottom:28px; }
    .bimg { width:64px; height:64px; border-radius:7px; object-fit:contain; padding:6px; flex-shrink:0; background:var(--bg3); }
    .blbl { font-size:8px; font-weight:500; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .bttl { font-size:24px; font-weight:400; letter-spacing:-0.02em; line-height:1.1; margin-bottom:4px; }
    .bdsc { font-size:12px; font-weight:300; color:var(--muted); line-height:1.7; }

    /* BACK */
    .back { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:400; color:var(--muted); margin-bottom:24px; cursor:pointer; background:none; border:none; padding:0; transition:color 0.2s; }
    .back:hover { color:var(--w); }
    .ar { transition:transform 0.2s; display:inline-block; }
    .back:hover .ar { transform:translateX(-3px); }

    .div { height:1px; background:var(--line); margin:0 0 28px; }

    @media(max-width:1100px){ .g3,.g4{grid-template-columns:repeat(2,1fr)} .g3b{grid-template-columns:repeat(2,1fr)} }
    @media(max-width:640px){ .topbar{padding:0 20px} .wrap{width:calc(100% - 32px)} h1{font-size:30px} .banner{flex-direction:column;text-align:center;padding:16px} .stats{gap:18px} }
    @media(max-width:420px){ .g3,.g4,.g3b{grid-template-columns:1fr} }
  </style>
</head>

// ── Render ─────────────────────────────────────────────
function renderMain() {
  document.getElementById('mg').innerHTML = D.map(c => `
    <article class="card c1" onclick="openCat('${c.id}')">
      <div class="iw"><img src="${c.p}" alt="${c.n}" loading="lazy"/></div>
      <div class="bd">
        <span class="tag">${c.en}</span>
        <div class="ttl">${c.n}</div>
        <p class="dsc">${c.d}</p>
        <div class="chips">${c.subs.map(s=>`<span class="chip">${s.n}</span>`).join('')}</div>
        <div class="cta">자세히 보기 →</div>
      </div>
    </article>`).join('');
}

function renderCat(id) {
  const c = D.find(x=>x.id===id);
  document.getElementById('cb').innerHTML = `
    <img class="bimg" src="${c.p}" alt="${c.n}"/>
    <div>
      <div class="blbl">LUSH · ${c.en}</div>
      <div class="bttl">${c.n}</div>
      <div class="bdsc">${c.d}</div>
    </div>`;
  document.getElementById('ct').textContent = `${c.n} 중분류`;
  document.getElementById('cc').textContent = `${c.subs.length} SUBCATEGORIES`;
  document.getElementById('cg').innerHTML = c.subs.map(s => `
    <article class="card c2" onclick="openSub('${c.id}','${s.id}')">
      <div class="iw"><img src="${s.p}" alt="${s.n}" loading="lazy"/></div>
      <div class="bd">
        <span class="tag">${s.en}</span>
        <div class="ttl">${s.n}</div>
        <p class="dsc">${s.d}</p>
        <div class="chips">${s.items.map(i=>`<span class="chip">${i.n}</span>`).join('')}</div>
        <div class="cta">소분류 보기 →</div>
      </div>
    </article>`).join('');
}

function renderSub(cid, sid) {
  const c = D.find(x=>x.id===cid);
  const s = c.subs.find(x=>x.id===sid);
  document.getElementById('sbl').textContent = `${c.n}으로 돌아가기`;
  document.getElementById('sback').onclick = () => openCat(cid);
  document.getElementById('sb2').innerHTML = `
    <img class="bimg" src="${s.p}" alt="${s.n}"/>
    <div>
      <div class="blbl">${c.n} · ${s.en}</div>
      <div class="bttl">${s.n}</div>
      <div class="bdsc">${s.d}</div>
    </div>`;
  document.getElementById('st').textContent = `${s.n} 소분류`;
  document.getElementById('sc').textContent = `${s.items.length} ITEMS`;
  document.getElementById('sg').innerHTML = s.items.map(i => `
    <article class="card c3">
      <div class="iw"><img src="${i.p}" alt="${i.n}" loading="lazy"/></div>
      <div class="bd">
        <span class="tag">${i.en}</span>
        <div class="ttl">${i.n}</div>
        <p class="dsc">${i.d}</p>
      </div>
    </article>`).join('');
}

// ── Nav ────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
function setBC(parts) {
  document.getElementById('bc').innerHTML = parts.map((p,i) => {
    const last = i===parts.length-1;
    return `${i>0?'<span class="sep">/</span>':''}<span class="crumb${last?' act':''}" onclick="${p.f||''}">${p.t}</span>`;
  }).join('');
}
function goHome() { show('pg-home'); setBC([{t:'홈'}]); }
function openCat(id) {
  const c=D.find(x=>x.id===id);
  renderCat(id); show('pg-cat');
  setBC([{t:'홈',f:'goHome()'},{t:c.n}]);
}
function openSub(cid, sid) {
  const c=D.find(x=>x.id===cid), s=c.subs.find(x=>x.id===sid);
  renderSub(cid,sid); show('pg-sub');
  setBC([{t:'홈',f:'goHome()'},{t:c.n,f:`openCat('${cid}')`},{t:s.n}]);
}

renderMain();
</script>
